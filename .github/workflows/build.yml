name: Build

on:
  push:
  pull_request:

jobs:
  build_1_21_1:
    name: Build (1.21.1) - ${{ matrix.loader }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        loader: [fabric, neoforge]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build
        run: ./gradlew :${{ matrix.loader }}:build --no-daemon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: creepersense-1.21.1-${{ matrix.loader }}
          path: |
            ${{ matrix.loader }}/build/libs/*.jar
