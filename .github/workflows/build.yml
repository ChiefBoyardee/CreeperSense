name: Build

on:
  push:
  pull_request:

jobs:
  build_1_20_1:
    name: Build (1.20.1) - ${{ matrix.loader }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        loader: [fabric, forge]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        working-directory: mc-1.20.1/${{ matrix.loader }}
        run: ./../../gradlew build --no-daemon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: creepersense-1.20.1-${{ matrix.loader }}
          path: |
            mc-1.20.1/${{ matrix.loader }}/build/libs/*.jar

  build_1_21_1:
    name: Build (1.21.1) - ${{ matrix.loader }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        loader: [fabric, neoforge]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Ensure Gradle wrapper executable
        run: chmod +x ./gradlew mc-26.1/gradlew

      - name: Build
        run: ./gradlew :${{ matrix.loader }}:build --no-daemon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: creepersense-1.21.1-${{ matrix.loader }}
          path: |
            ${{ matrix.loader }}/build/libs/*.jar

  build_26_1:
    name: Build (26.1) - ${{ matrix.loader }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        loader: [fabric, neoforge]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Ensure Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        working-directory: mc-26.1/${{ matrix.loader }}
        run: bash ../gradlew build --no-daemon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: creepersense-26.1-${{ matrix.loader }}
          path: |
            mc-26.1/${{ matrix.loader }}/build/libs/*.jar
